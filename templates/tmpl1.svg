<svg viewBox="0 0 480 304" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5c0"/>
      <stop offset="50%" stop-color="#d4b898"/>
      <stop offset="100%" stop-color="#c9a87c"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a07828" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- warm gradient background -->
  <rect width="480" height="304" fill="url(#g1)"/>
  <rect width="480" height="304" fill="url(#g2)"/>
  <!-- subtle grain lines -->
  <rect width="480" height="304" fill="none" opacity="0.06"
    style="background:repeating-linear-gradient(0deg,rgba(0,0,0,.04) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,0) 8px)"/>
  <!-- dashed border -->
  <rect x="12" y="12" width="456" height="280" fill="none" stroke="rgba(139,26,26,0.35)" stroke-width="1.5" stroke-dasharray="6,4" rx="3"/>
  <rect x="18" y="18" width="444" height="268" fill="none" stroke="rgba(139,26,26,0.18)" stroke-width="1" stroke-dasharray="3,5" rx="2"/>
  <!-- centre plus circle -->
  <circle cx="240" cy="130" r="36" fill="rgba(255,255,255,0.55)" stroke="rgba(139,26,26,0.3)" stroke-width="1.5"/>
  <!-- plus sign -->
  <line x1="240" y1="114" x2="240" y2="146" stroke="#8b1a1a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="224" y1="130" x2="256" y2="130" stroke="#8b1a1a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- label -->
  <text x="240" y="190" font-family="Special Elite,cursive" font-size="13" fill="#8b1a1a" text-anchor="middle" opacity="0.7" letter-spacing="3">YOUR PHOTO</text>
  <text x="240" y="208" font-family="Special Elite,cursive" font-size="9" fill="#a07828" text-anchor="middle" opacity="0.55" letter-spacing="2">tap to upload</text>
  <!-- corner ornaments -->
  <text x="30" y="42" font-family="serif" font-size="16" fill="#8b1a1a" text-anchor="middle" opacity="0.25">✦</text>
  <text x="450" y="42" font-family="serif" font-size="16" fill="#8b1a1a" text-anchor="middle" opacity="0.25">✦</text>
  <text x="30" y="286" font-family="serif" font-size="16" fill="#8b1a1a" text-anchor="middle" opacity="0.25">✦</text>
  <text x="450" y="286" font-family="serif" font-size="16" fill="#8b1a1a" text-anchor="middle" opacity="0.25">✦</text>
</svg>